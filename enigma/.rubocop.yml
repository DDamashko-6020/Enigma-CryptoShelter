AllCops:
  NewCops: enable
  TargetRubyVersion: 3.0
  Exclude:
    - 'vendor/**/*'
    - 'spec/**/*'
  SuggestExtensions: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Metrics/MethodLength:
  Max: 25
  Exclude:
    - 'app/ui/**/*'

Metrics/ClassLength:
  Max: 200
  Exclude:
    - 'app/ui/**/*'

Metrics/AbcSize:
  Max: 17
  Exclude:
    - 'app/ui/**/*'

Metrics/CyclomaticComplexity:
  Max: 7
  Exclude:
    - 'app/ui/**/*'

Metrics/PerceivedComplexity:
  Max: 8
  Exclude:
    - 'app/ui/**/*'

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'app/ui/**/*'

Layout/LineLength:
  Max: 120
  Exclude:
    - 'app/ui/**/*'

Metrics/ParameterLists:
  Exclude:
    - 'app/core/vault/credential.rb'

Style/Documentation:
  Enabled: false

Naming/AccessorMethodName:
  Exclude:
    - 'app/ui/**/*'

Lint/MissingSuper:
  Enabled: false

Style/OpenStructUse:
  Enabled: false
